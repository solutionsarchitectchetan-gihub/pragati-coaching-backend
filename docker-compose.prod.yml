services:
  postgres:
    image: postgres:16-alpine
    container_name: pragati-postgres
    environment:
      POSTGRES_DB: pragatidb
      POSTGRES_USER: ${DATABASE_USER:-pragati}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-pragati123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pragati-net
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U pragati"]
      interval: 10s
      retries: 5

  backend:
    build: .
    container_name: pragati-backend-prod
    ports:
      - "8080:8080"
    env_file: .env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx1g -Xms512m -XX:+UseG1GC
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pragati-net
    restart: always


networks:
  pragati-net:
    driver: bridge
