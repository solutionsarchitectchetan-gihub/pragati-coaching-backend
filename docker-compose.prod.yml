services:
  backend:
    image: architectchetan/pragati-backend:latest
    container_name: pragati-backend-prod
    ports:
      - "8080:8080"
    env_file: .env.prod
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - JAVA_OPTS=-Xmx1g -Xms512m -XX:+UseG1GC
    networks:
      - pragati-net
    restart: always

networks:
  pragati-net:
    driver: bridge
