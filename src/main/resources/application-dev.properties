# ── Dev Profile (H2 in-memory) ────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:pragatidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Flyway — Dev (H2 SQL) ─────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/dev
spring.flyway.baseline-on-migrate=true
# OK for dev — wipes and re-runs on schema change (NEVER set true in prod!)
spring.flyway.clean-disabled=false

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:5173

# Logging
logging.level.com.pragati=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.flywaydb=INFO
