# ── Prod Profile (MySQL) ──────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/pragatidb?useSSL=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${DATABASE_USER:pragati}
spring.datasource.password=${DATABASE_PASSWORD:PragatiProd@2024}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Flyway owns the schema — Hibernate only validates
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ── Flyway — Prod (MySQL SQL) ─────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/prod
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
# NEVER set clean-on-validation-error=true in prod (would wipe data!)

# CORS
cors.allowed-origins=${ALLOWED_ORIGINS:https://pragatitech.in,https://www.pragatitech.in}

# Logging
logging.level.com.pragati=INFO
logging.level.org.flywaydb=INFO
logging.level.root=WARN
