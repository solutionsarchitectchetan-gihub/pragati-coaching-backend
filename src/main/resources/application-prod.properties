spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway disabled — PostgreSQL 18 not yet supported by Flyway Community Edition
# Schema created manually via psql (see db/migration/prod/*.sql)
spring.flyway.enabled=false

# CORS
cors.allowed-origins=${ALLOWED_ORIGINS:https://pragatitech.in,https://www.pragatitech.in}

# Logging
logging.level.com.pragati=INFO
logging.level.root=WARN
