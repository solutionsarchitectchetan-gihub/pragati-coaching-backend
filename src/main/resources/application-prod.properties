spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/prod
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
# NEVER set clean-on-validation-error=true in prod (would wipe data!)

# CORS
cors.allowed-origins=${ALLOWED_ORIGINS:https://pragatitech.in,https://www.pragatitech.in}

# Logging
logging.level.com.pragati=INFO
logging.level.org.flywaydb=INFO
logging.level.root=WARN
